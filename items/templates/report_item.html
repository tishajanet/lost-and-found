{% extends "base.html" %}

{% block content %}

<h4>Report Item</h4>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <table class="table">

    <tr>
        <td>Name:</td>
        <td>{{ form.name }}</td>
    </tr>

    <tr>
        <td>Description:</td>
        <td>{{ form.description }}</td>
    </tr>

    <tr>
        <td>Location:</td>
        <td>{{ form.location_found }}</td>
    </tr>

    <tr>
        <td>Status:</td>
        <td>{{ form.status }}</td>
    </tr>

    <tr>
        <td>Image:</td>
        <td>{{ form.image }}</td>
    </tr>

    </table>

    <button class="btn btn-dark">Submit Item Details</button>
    <a href="/" class="btn btn-secondary">Back</a>

</form>

{% endblock %}
